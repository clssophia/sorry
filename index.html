<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sophia의 쪽지</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="to">To. Alex</div>

  <div class="instruction">Sophia의 쪽지를 펼쳐보세요</div>

  <div class="frame">
    <div class="left-panel">
      <img id="leftWord" class="handword mian-img" src="mian_hand.png" alt="미안">
    </div>

    <div id="middlePanel" class="middle-panel">
      <img id="hiddenWord" class="handword hadago-img" src="hadago_hand.png" alt="하다고">
      <div id="foldLeft" class="fold fold-left"></div>
      <div id="foldRight" class="fold fold-right"></div>
    </div>

    <div id="slideGroup">
      <div class="right-panel">
        <img id="rightWord" class="handword hae-img" src="hae_hand.png" alt="해">
      </div>
    </div>
  </div>

  <div class="from">From. Sophia</div>

  <script src="script.js"></script>
</body>
</html>
